<div class="lp-cards">
  {% for card in include.cards %}
  <a href="{{ card.url }}" class="lp-card">
    <div class="lp-card-thumb">
      <img src="{{ card.image }}" alt="{{ card.image_alt }}">
    </div>
    <div class="lp-card-body">
      <div class="lp-card-title">{{ card.title }}</div>
      <p class="lp-card-desc">{{ card.description }}</p>
    </div>
  </a>
  {% endfor %}
</div>
