  description: Yale began collecting Chinese-language books in 1849, making it the
    first academic library in the United States to do so. The East Asia Library holds
    439 catalogued rare books and manuscripts (primarily pre-1796) in its Chinese
    Rare Books database, alongside a substantial archive covering missionaries, diplomats,
    educators, and scholars connected to China. The Yale-China Association Records,
    the Yung Wing Papers, and the Barbara Tuchman Papers are among the most significant
    archival holdings.
  walkin: Stack access restricted to Yale affiliates; visiting researchers may register
    for a free Yale Library account for limited access, or purchase a borrowing pass;
    special collections accessible to non-affiliates via advance registration in Aeon
    system; East Asian Library reading room in Sterling Memorial Library, SML 219.
