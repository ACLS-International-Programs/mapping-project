  description: One of the world’s preeminent East Asian research libraries, with over
    1 million volumes and exceptional rare book, photograph, and archival collections.
    Particular strengths include Chinese rare books, local gazetteers, the Manchukuo
    Collection, Naxi manuscripts, and comprehensive holdings in Manchu and Mongolian;
    notable named collections include the Qi Rushan Collection, the Hedda Morrison
    Photographs, and the papers of the Science Society of China.
  walkin: Full electronic access to collection of digitized Chinese rare books; visitors
