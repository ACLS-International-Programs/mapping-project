  ag: ''
  description: The Elling O. Eide Library is a private, independent, non-profit, non-circulating
    special collections research library named for its founder, Elling Oliver Eide
    (1935–2012). With over 75,000 volumes — including more than 60,000 Chinese books
    — it is one of the largest private Chinese libraries in the world. Holdings of
    printed materials, manuscripts, rare books, artwork and objects, ephemera, audio-visual
    materials, and works on paper span the entire history of China from antiquity
    to the modern period, with particular depth in the literature, linguistics, history,
    and culture of medieval China (200–1000 CE) and neighboring regions of greater
    East Asia, including Inner Asia. The library has a collaborative agreement with
    Taiwan's National Central Library for the Union Catalog of Rare Chinese Books
    and is actively expanding and digitizing its holdings.
